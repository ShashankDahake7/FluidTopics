services:
  - type: pserv
    name: elasticsearch
    runtime: docker
    plan: standard
    envVars:
      - key: discovery.type
        value: single-node
      - key: xpack.security.enabled
        value: "false"
      - key: ES_JAVA_OPTS
        value: "-Xms512m -Xmx512m"
    disk:
      name: es-data
      mountPath: /usr/share/elasticsearch/data
      sizeGB: 10